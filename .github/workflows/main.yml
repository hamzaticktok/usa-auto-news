name: 4-Shorts Final Pro Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          # تصحيح شامل لسياسات ImageMagick لضمان عمل النصوص والصور
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml
          sudo sed -i '/<policy domain="resource" name="disk" value="1GiB"\/>/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install requests beautifulsoup4 lxml edge-tts pillow numpy moviepy==1.0.3

      - name: Run Generator
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat << 'EOF' > news_to_video.py
          import os, requests, random, textwrap, asyncio
          from bs4 import BeautifulSoup
          import edge_tts
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, ColorClip, AudioFileClip, vfx
          from moviepy.config import change_settings

          # تحديد مسار ImageMagick بدقة
          change_settings({"IMAGEMAGICK_BINARY": "/usr/bin/convert"})

          async def main():
              api_key = os.getenv('PEXELS_API_KEY')
              os.makedirs("output", exist_ok=True)
              
              print("🌐 Fetching News...")
              res = requests.get("https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en")
              soup = BeautifulSoup(res.content, 'lxml-xml')
              items = soup.find_all('item')[:4]
              
              for i, item in enumerate(items):
                  try:
                      title = item.title.text.split(' - ')[0].replace('"', '')
                      print(f"🎬 Creating Short {i+1}: {title}")
                      
                      # 1. الصوت
                      audio_path = f"audio_{i}.mp3"
                      communicate = edge_tts.Communicate(f"Breaking. {title}", "en-US-ChristopherNeural")
                      await communicate.save(audio_path)
                      voice = AudioFileClip(audio_path)

                      # 2. الفيديو الخلفي
                      headers = {'Authorization': api_key}
                      v_res = requests.get(f"https://api.pexels.com/videos/search?query=news&per_page=10", headers=headers)
                      v_data = v_res.json()
                      v_link = random.choice(v_data['videos'])['video_files'][0]['link'] if v_data.get('videos') else "https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-background-43553-large.mp4"
                      
                      v_path = f"raw_{i}.mp4"
                      with open(v_path, "wb") as f: f.write(requests.get(v_link).content)

                      # 3. المونتاج (التعديل لضمان الظهور البصري)
                      # نقوم بإنشاء الفيديو الخام أولاً
                      bg_clip = VideoFileClip(v_path).resize(height=1920).crop(x_center=540, width=1080).set_duration(voice.duration + 1)
                      
                      # إضافة طبقة سوداء شفافة لتحسين رؤية النص
                      overlay = ColorClip(size=(1080, 500), color=(0,0,0)).set_opacity(0.6).set_position(('center', 1300)).set_duration(bg_clip.duration)
                      
                      # إضافة النص
                      wrapped_text = "\n".join(textwrap.wrap(title.upper(), width=20))
                      txt = TextClip(wrapped_text, fontsize=70, color='white', font='Arial-Bold', method='caption', size=(900, None)).set_position(('center', 1350)).set_duration(bg_clip.duration)
                      
                      # دمج كل الطبقات (التأكد من أن bg_clip هو الطبقة الأولى)
                      final = CompositeVideoClip([bg_clip, overlay, txt], size=(1080, 1920))
                      final = final.set_audio(voice)
                      
                      # كتابة الملف النهائي مع إعدادات تضمن دمج الفيديو
                      output_file = f"output/short_{i+1}.mp4"
                      final.write_videofile(output_file, fps=24, codec="libx264", audio_codec="aac", temp_audiofile=f"temp_{i}.m4a", remove_temp=True, preset="ultrafast")
                      
                      # تنظيف إجباري للذاكرة
                      final.close()
                      bg_clip.close()
                      voice.close()
                      
                  except Exception as e:
                      print(f"❌ Error in {i}: {e}")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python3 news_to_video.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Viral-Shorts-Final
          path: output/
