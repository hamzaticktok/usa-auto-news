name: 4-Shorts Pro Factory HD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools & Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          pip install requests beautifulsoup4 lxml edge-tts

      - name: Generate HD Shorts
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat << 'EOF' > news_to_video.py
          import os, requests, random, asyncio, textwrap
          from bs4 import BeautifulSoup
          import edge_tts

          async def main():
              api_key = os.getenv('PEXELS_API_KEY')
              os.makedirs("output", exist_ok=True)
              
              if not api_key:
                  print("❌ Error: PEXELS_API_KEY is missing in Secrets!")
                  return

              print("🌐 Fetching Latest News...")
              res = requests.get("https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en")
              soup = BeautifulSoup(res.content, 'lxml-xml')
              items = soup.find_all('item')[:4]
              
              for i, item in enumerate(items):
                  try:
                      # تنظيف العنوان وتجهيزه
                      full_title = item.title.text.split(' - ')[0].replace('"', '').replace("'", "")
                      display_title = textwrap.fill(full_title.upper(), width=30)
                      print(f"🎬 Processing Video {i+1}: {full_title[:50]}...")
                      
                      # 1. توليد صوت احترافي (Neural Voice)
                      audio_path = f"audio_{i}.mp3"
                      voice_text = f"Breaking news update. {full_title}. Stay tuned for more."
                      communicate = edge_tts.Communicate(voice_text, "en-US-ChristopherNeural")
                      await communicate.save(audio_path)

                      # 2. جلب فيديو عالي الجودة من Pexels
                      headers = {'Authorization': api_key}
                      search_term = full_title.split()[0]
                      v_res = requests.get(f"https://api.pexels.com/videos/search?query={search_term}&per_page=10&orientation=portrait", headers=headers)
                      v_data = v_res.json()
                      
                      if 'videos' in v_data and len(v_data['videos']) > 0:
                          # اختيار أعلى جودة متاحة للفيديو
                          video_files = v_data['videos'][0]['video_files']
                          v_link = max(video_files, key=lambda x: x.get('width', 0))['link']
                      else:
                          v_link = "https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-background-43553-large.mp4"
                      
                      v_path = f"raw_{i}.mp4"
                      with open(v_path, "wb") as f: f.write(requests.get(v_link).content)

                      # 3. المونتاج باستخدام FFmpeg بإعدادات HD
                      output_file = f"output/short_{i+1}.mp4"
                      
                      # إعدادات الفلتر: 
                      # - تكبير الفيديو لملء الشاشة 1080x1920
                      # - إضافة صندوق أسود شفاف خلف النص
                      # - إضافة النص بخط عريض وواضح
                      video_filter = (
                          f"scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,"
                          f"drawbox=y=ih-500:color=black@0.7:width=iw:height=400:t=fill,"
                          f"drawtext=text='{full_title[:65]}...':fontcolor=white:fontsize=55:"
                          f"x=(w-text_w)/2:y=h-400:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
                      )

                      # -crf 18: تعني جودة سينمائية فائقة
                      # -preset slow: تعني ضغط أفضل وجودة أعلى
                      ffmpeg_cmd = (
                          f'ffmpeg -i {v_path} -i {audio_path} -t 15 '
                          f'-vf "{video_filter}" '
                          f'-c:v libx264 -crf 18 -preset slow -pix_fmt yuv420p '
                          f'-c:a aac -b:a 192k -shortest {output_file} -y'
                      )
                      
                      os.system(ffmpeg_cmd)
                      print(f"✅ Created HD Video: {output_file}")
                      
                  except Exception as e:
                      print(f"❌ Error in Video {i+1}: {e}")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python3 news_to_video.py

      - name: Upload HD Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Pro-Shorts-HD-Package
          path: output/*.mp4
