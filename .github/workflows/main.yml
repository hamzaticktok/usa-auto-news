name: TrendsUSA Auto Bot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install moviepy imageio[ffmpeg]
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Engine
        run: |
          # الانتقال للمجلد الذي يحتوي على السكربت وتشغيله
          cd usa-auto-news
          python3 your_script.py
        # هذا السطر يخبر GitHub أنه إذا فشل المجلد الأول جرب المسار البديل
        continue-on-error: true 

      - name: Run Engine (Fallback)
        run: |
          # محاولة تشغيل السكربت في حال كان في المجلد الرئيسي
          python3 your_script.py
        if: success() == false

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: usa-trends-video
          path: "**/output/*.mp4"
