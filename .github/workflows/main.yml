import os
import random
from moviepy.editor import VideoFileClip, AudioFileClip, concatenate_videoclips

# ===============================
# SETTINGS
# ===============================
video_folder = "output"
music_folder = "music"

# ===============================
# CHECK VIDEO FILES
# ===============================
if not os.path.exists(video_folder):
    print("❌ Output folder not found.")
    exit(1)

video_files = [
    os.path.join(video_folder, f)
    for f in os.listdir(video_folder)
    if f.endswith(".mp4")
]

if not video_files:
    print("❌ No video files found in output folder.")
    exit(1)

print(f"✅ Found {len(video_files)} video files.")

# ===============================
# LOAD VIDEOS
# ===============================
clips = []
for file in video_files:
    try:
        clip = VideoFileClip(file)
        clips.append(clip)
    except Exception as e:
        print(f"⚠️ Error loading video {file}: {e}")

if not clips:
    print("❌ No valid video clips could be loaded.")
    exit(1)

final_video = concatenate_videoclips(clips, method="compose")

# ===============================
# OPTIONAL MUSIC
# ===============================
music_files = []

if os.path.exists(music_folder):
    music_files = [
        os.path.join(music_folder, f)
        for f in os.listdir(music_folder)
        if f.endswith(".mp3")
    ]

if music_files:
    print(f"🎵 Found {len(music_files)} music files.")
    selected_music = random.choice(music_files)

    try:
        audio = AudioFileClip(selected_music)
        audio = audio.subclip(0, final_video.duration)
        final_video = final_video.set_audio(audio)
        print("✅ Background music added.")
    except Exception as e:
        print(f"⚠️ Could not add music: {e}")
else:
    print("ℹ️ No music found. Video will be generated without background music.")

# ===============================
# EXPORT FINAL VIDEO
# ===============================
output_path = os.path.join(video_folder, "final_video.mp4")

try:
    final_video.write_videofile(
        output_path,
        codec="libx264",
        audio_codec="aac"
    )
    print(f"✅ Final video saved to {output_path}")
except Exception as e:
    print(f"❌ Error exporting video: {e}")
    exit(1)

print("🎉 Script completed successfully.")
