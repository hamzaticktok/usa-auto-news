name: USA Trends Professional Video Generator

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run workflow on'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/${{ github.event.inputs.branch || github.ref_name }}' || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy imageio imageio-ffmpeg requests

      - name: Create Output Folder
        run: mkdir -p output

      - name: Run main.py
        run: python main.py

      - name: Check Output Folder
        run: ls -la output/

      # رفع Shorts
      - name: Upload Shorts Artifact
        run: |
          find output -type f -iname "usa_trends_shorts_*.mp4" > shorts_list.txt
          mkdir -p artifact_shorts
          while read file; do cp "$file" artifact_shorts/; done < shorts_list.txt
          ls -la artifact_shorts
        uses: actions/upload-artifact@v4
        with:
          name: usa-trends-shorts
          path: artifact_shorts

      # رفع Long Video
      - name: Upload Long Video Artifact
        run: |
          find output -type f -iname "usa_trends_long_*.mp4" > long_list.txt
          mkdir -p artifact_long
          while read file; do cp "$file" artifact_long/; done < long_list.txt
          ls -la artifact_long
        uses: actions/upload-artifact@v4
        with:
          name: usa-trends-long
          path: artifact_long
