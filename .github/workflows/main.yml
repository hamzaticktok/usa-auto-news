name: USA Trends Full Video Generator

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run workflow on'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      # -------------------------
      # INSTALL SYSTEM DEPENDENCIES
      # -------------------------
      - name: Install FFmpeg and system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsm6 libxext6

      # -------------------------
      # SETUP PYTHON
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # -------------------------
      # INSTALL PYTHON DEPENDENCIES
      # -------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel
          python -m pip install moviepy==1.0.3
          python -m pip install imageio
          python -m pip install imageio-ffmpeg
          python -m pip install numpy
          python -m pip install requests

      # -------------------------
      # RUN SCRIPT
      # -------------------------
      - name: Create Output Folder
        run: mkdir -p output

      - name: Run main.py
        run: python main.py

      - name: List Output Files
        run: ls -la output/ || echo "No files generated"

      # -------------------------
      # SHORTS ARTIFACT
      # -------------------------
      - name: Prepare Shorts Artifact
        run: |
          mkdir -p artifact_shorts
          find output -type f -iname "usa_trends_shorts_*.mp4" -exec cp {} artifact_shorts/ \; || true

      - name: Upload Shorts Artifact
        uses: actions/upload-artifact@v4
        with:
          name: usa-trends-shorts
          path: artifact_shorts
          if-no-files-found: ignore

      # -------------------------
      # LONG VIDEO ARTIFACT
      # -------------------------
      - name: Prepare Long Video Artifact
        run: |
          mkdir -p artifact_long
          find output -type f -iname "usa_trends_long_*.mp4" -exec cp {} artifact_long/ \; || true

      - name: Upload Long Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: usa-trends-long
          path: artifact_long
          if-no-files-found: ignore
