name: Build Videos

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install moviepy imageio[ffmpeg]

    - name: Download Assets
      run: |
        mkdir -p videos music output
        curl -L https://github.com/selimb/mini-video/raw/main/video1.mp4 -o videos/video1.mp4
        curl -L https://github.com/selimb/mini-video/raw/main/video2.mp4 -o videos/video2.mp4
        curl -L https://github.com/selimb/mini-video/raw/main/music.mp3 -o music/sample.mp3

    - name: Run Script
      run: python3 your_script.py

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: final-videos
        path: output/
