name: TrendsUSA Mega Fix v3

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install moviepy==1.0.3 imageio==2.25.1 proglog requests

      - name: Generate and Run Script
        run: |
          cat <<EOT > your_script.py
          import os, requests
          from moviepy.editor import VideoFileClip, AudioFileClip

          os.makedirs("output", exist_ok=True)
          os.makedirs("temp", exist_ok=True)

          # روابط جديدة مستقرة جداً
          v_url = "https://v1.shared.global.fastly.net/p/128/videos/4223/4223-157434192_tiny.mp4"
          m_url = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

          def download_file(url, dest):
              print(f"Downloading: {url}")
              headers = {'User-Agent': 'Mozilla/5.0'}
              r = requests.get(url, headers=headers, stream=True, timeout=30)
              with open(dest, 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)

          try:
              download_file(v_url, "temp/v.mp4")
              download_file(m_url, "temp/m.mp3")

              print("Processing video...")
              clip = VideoFileClip("temp/v.mp4").subclip(0, 5).resize(height=1280)
              # إضافة صوت بسيط
              final = clip.set_duration(5)
              
              final.write_videofile("output/final_video.mp4", codec="libx264", audio_codec="aac", fps=24)
              print("✅ Success! Real content generated.")
          except Exception as e:
              print(f"❌ Error occurred: {e}")
              exit(1)
          EOT
          
          python3 your_script.py

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trends-usa-real-video
          path: "output/*.mp4"
