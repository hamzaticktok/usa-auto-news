name: 4-Shorts FFmpeg Ultra-Fast

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests beautifulsoup4 lxml edge-tts

      - name: Run Generator
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat << 'EOF' > news_to_video.py
          import os, requests, random, asyncio
          from bs4 import BeautifulSoup
          import edge_tts

          async def main():
              api_key = os.getenv('PEXELS_API_KEY')
              os.makedirs("output", exist_ok=True)
              
              print("🌐 Fetching News...")
              res = requests.get("https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en")
              soup = BeautifulSoup(res.content, 'lxml-xml')
              items = soup.find_all('item')[:4]
              
              for i, item in enumerate(items):
                  try:
                      title = item.title.text.split(' - ')[0].replace('"', '').replace("'", "")
                      print(f"🎬 Processing: {title}")
                      
                      # 1. توليد الصوت
                      audio_path = f"audio_{i}.mp3"
                      communicate = edge_tts.Communicate(f"Breaking news. {title}", "en-US-ChristopherNeural")
                      await communicate.save(audio_path)

                      # 2. جلب الفيديو الخام
                      headers = {'Authorization': api_key}
                      v_res = requests.get(f"https://api.pexels.com/videos/search?query=news&per_page=10", headers=headers)
                      v_link = random.choice(v_res.json()['videos'])['video_files'][0]['link']
                      v_path = f"raw_{i}.mp4"
                      with open(v_path, "wb") as f: f.write(requests.get(v_link).content)

                      # 3. استخدام FFmpeg لدمج كل شيء (الحل السحري)
                      # هذا الأمر يقوم بقص الفيديو، دمج الصوت، وإضافة النص في منتصف الشاشة
                      output_file = f"output/short_{i+1}.mp4"
                      
                      ffmpeg_cmd = (
                          f'ffmpeg -i {v_path} -i {audio_path} -t 15 '
                          f'-vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,'
                          f'drawbox=y=ih-400:color=black@0.6:width=iw:height=300:t=fill,'
                          f'drawtext=text=\'{title[:50]}...\':fontcolor=white:fontsize=60:x=(w-text_w)/2:y=h-300" '
                          f'-c:v libx264 -preset ultrafast -c:a aac -shortest {output_file} -y'
                      )
                      os.system(ffmpeg_cmd)
                      print(f"✅ Created: {output_file}")
                      
                  except Exception as e:
                      print(f"❌ Error: {e}")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python3 news_to_video.py

      - name: Upload Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Final-MP4-Videos
          path: output/*.mp4
