name: USA Trends Auto-Creator

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          # تعديل سياسة ImageMagick للسماح بالكتابة على الفيديو
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml
          pip install moviepy==1.0.3 imageio==2.25.1

      - name: Create USA Trend Script
        run: |
          cat <<EOT > your_script.py
          import os
          from moviepy.editor import ColorClip, TextClip, CompositeVideoClip

          os.makedirs("output", exist_ok=True)

          print("🎬 Generating USA TRENDS content...")
          
          # 1. خلفية سوداء فخمة (Shorts Format)
          bg = ColorClip(size=(1080, 1920), color=(10, 10, 10), duration=10)
          
          # 2. نص العنوان (USA TRENDS)
          try:
              title = TextClip("USA TRENDS 2026", fontsize=80, color='red', font='Arial-Bold', method='caption', size=(1000, None))
              title = title.set_position(('center', 400)).set_duration(10)
              
              # 3. اسم قناتك
              channel_name = TextClip("@TRENDSUSA25", fontsize=50, color='white', font='Arial', method='caption', size=(800, None))
              channel_name = channel_name.set_position(('center', 1500)).set_duration(10)
              
              # دمج العناصر
              final = CompositeVideoClip([bg, title, channel_name])
          except Exception as e:
              print(f"Text error: {e}. Falling back to visual only.")
              final = bg

          print("💾 Exporting Video...")
          final.write_videofile("output/usa_trend_video.mp4", codec="libx264", fps=24, audio=False)
          print("✅ Video created: output/usa_trend_video.mp4")
          EOT
          
          python3 your_script.py

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: USA-Trend-Video
          path: "output/*.mp4"
