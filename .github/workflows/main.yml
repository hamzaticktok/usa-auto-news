name: TrendsUSA Mega Fix v2

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # تثبيت إصدار محدد لضمان التوافق
          pip install moviepy==1.0.3 imageio==2.25.1 proglog

      - name: Emergency Script Creation & Execution
        run: |
          cat <<EOT > your_script.py
          import os, urllib.request
          from moviepy.editor import VideoFileClip, concatenate_videoclips
          
          os.makedirs("output", exist_ok=True)
          os.makedirs("videos", exist_ok=True)
          
          # تحميل فيديو تجريبي لضمان العمل
          print("Downloading sample video...")
          urllib.request.urlretrieve("https://github.com/selimb/mini-video/raw/main/video1.mp4", "videos/v1.mp4")
          
          print("Processing video...")
          clip = VideoFileClip("videos/v1.mp4").resize(width=720)
          final = concatenate_videoclips([clip])
          final.write_videofile("output/final_video.mp4", codec="libx264", audio_codec="aac", fps=24)
          print("✅ Video created successfully!")
          EOT
          
          python3 your_script.py

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output
          path: "output/*.mp4"
