import os, requests
          from bs4 import BeautifulSoup
          from gtts import gTTS
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, AudioFileClip, ColorClip, concatenate_videoclips
          import PIL.Image

          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          def get_all_trends(limit=5):
              url = "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"
              r = requests.get(url, timeout=10)
              soup = BeautifulSoup(r.content, 'xml')
              items = soup.find_all('item')[:limit]
              return [item.title.text.split("-")[0].strip() for item in items]

          def get_video_from_pexels(query):
              api_key = os.getenv('PEXELS_API_KEY')
              headers = {'Authorization': api_key}
              url = f"https://api.pexels.com/videos/search?query={query}&per_page=1&orientation=portrait"
              try:
                  r = requests.get(url, headers=headers, timeout=15)
                  video_url = r.json()['videos'][0]['video_files'][0]['link']
                  return video_url
              except:
                  return "https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-news-report-background-33303-large.mp4"

          def create_single_clip(title, filename):
              # إنشاء الصوت
              tts = gTTS(text=f"Breaking news. {title}", lang='en')
              audio_path = f"temp/audio_{filename}.mp3"
              tts.save(audio_path)
              audio = AudioFileClip(audio_path)

              # جلب الفيديو
              search_q = " ".join(title.split()[:2])
              v_url = get_video_from_pexels(search_q)
              v_r = requests.get(v_url)
              v_path = f"temp/bg_{filename}.mp4"
              with open(v_path, "wb") as f: f.write(v_r.content)

              # معالجة الفيديو والنصوص
              clip = VideoFileClip(v_path).resize(height=1920).crop(x_center=540, width=1080).set_duration(audio.duration + 1)
              bar = ColorClip(size=(1080, 400), color=(200, 0, 0)).set_opacity(0.8).set_position(('center', 1300)).set_duration(clip.duration)
              txt = TextClip(title.upper(), fontsize=60, color='white', font='DejaVu-Sans-Bold', method='caption', size=(900, None)).set_position(('center', 1350)).set_duration(clip.duration)
              header = TextClip("LIVE NEWS", fontsize=80, color='yellow', font='DejaVu-Sans-Bold').set_position(('center', 200)).set_duration(clip.duration)
              
              return CompositeVideoClip([clip, bar, txt, header]).set_audio(audio)

          # التنفيذ
          os.makedirs("output", exist_ok=True)
          os.makedirs("temp", exist_ok=True)
          all_news = get_all_trends(5)

          # 1. إنتاج الـ Shorts (أول خبرين)
          short1 = create_single_clip(all_news[0], "short1")
          short1.write_videofile("output/short_1.mp4", fps=24)

          short2 = create_single_clip(all_news[1], "short2")
          short2.write_videofile("output/short_2.mp4", fps=24)

          # 2. إنتاج الفيديو الطويل (تجميع 5 أخبار)
          print("Creating Long Video...")
          long_clips = []
          for i, news in enumerate(all_news):
              long_clips.append(create_single_clip(news, f"long_{i}"))
          
          final_long = concatenate_videoclips(long_clips, method="compose")
          final_long.write_videofile("output/long_video.mp4", fps=24)
