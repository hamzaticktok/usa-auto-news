name: TrendsUSA Bot - Final Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install moviepy==1.0.3 imageio==2.25.1 proglog

      - name: Generate and Run Script
        run: |
          cat <<EOT > your_script.py
          import os, urllib.request
          from moviepy.editor import ColorClip
          
          os.makedirs("output", exist_ok=True)
          
          print("Creating a synthetic video for testing...")
          # بدلاً من تحميل فيديو خارجي قد يتعطل، سننشئ فيديو ملون برمجياً للتجربة
          clip = ColorClip(size=(720, 1280), color=[255, 0, 0], duration=5)
          clip = clip.set_fps(24)
          
          print("Writing video file...")
          clip.write_videofile("output/final_video.mp4", codec="libx264", audio_codec="aac")
          print("✅ Success! Video created inside output/ folder.")
          EOT
          
          python3 your_script.py

      - name: Upload Finished Video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trends-usa-test-video
          path: output/
