name: Build Videos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install moviepy imageio[ffmpeg]

    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Prepare folders
      run: |
        mkdir -p output
        mkdir -p music

    # تنزيل فيديوهات تجريبية قصيرة
    - name: Download sample videos
      run: |
        wget -O output/video1.mp4 "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4"
        wget -O output/video2.mp4 "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4"

    # تنزيل موسيقى تجريبية
    - name: Download sample music
      run: |
        wget -O music/music.mp3 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"

    - name: Run video script
      run: python3 your_script.py

    - name: Upload output videos
      uses: actions/upload-artifact@v4
      with:
        name: videos
        path: output/
