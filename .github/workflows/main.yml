name: 4-Shorts Final Pro Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          # تصحيح سياسة ImageMagick للسماح برسم النصوص
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install requests beautifulsoup4 lxml edge-tts pillow numpy moviepy==1.0.3

      - name: Run Generator
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat << 'EOF' > news_to_video.py
          import os, requests, random, textwrap, asyncio
          from bs4 import BeautifulSoup
          import edge_tts
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, ColorClip, AudioFileClip, vfx
          from moviepy.config import change_settings

          # إعداد ImageMagick
          change_settings({"IMAGEMAGICK_BINARY": "/usr/bin/convert"})

          async def main():
              api_key = os.getenv('PEXELS_API_KEY')
              output_dir = os.path.abspath("output")
              os.makedirs(output_dir, exist_ok=True)
              
              print(f"📂 Output directory created at: {output_dir}")

              # التحقق من الـ API
              if not api_key:
                  print("❌ Error: PEXELS_API_KEY is missing!")
                  return

              print("🌐 Fetching News...")
              try:
                  res = requests.get("https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en", timeout=20)
                  soup = BeautifulSoup(res.content, 'lxml-xml')
                  items = soup.find_all('item')[:4]
              except Exception as e:
                  print(f"❌ Failed to fetch news: {e}")
                  return
              
              for i, item in enumerate(items):
                  try:
                      title = item.title.text.split(' - ')[0].replace('"', '')
                      print(f"🎬 Processing Short {i+1}: {title}")
                      
                      # 1. توليد الصوت
                      audio_path = os.path.join(output_dir, f"audio_{i}.mp3")
                      communicate = edge_tts.Communicate(f"Breaking news. {title}", "en-US-ChristopherNeural")
                      await communicate.save(audio_path)
                      voice = AudioFileClip(audio_path)

                      # 2. جلب الفيديو
                      headers = {'Authorization': api_key}
                      v_res = requests.get(f"https://api.pexels.com/videos/search?query=news&per_page=10", headers=headers)
                      v_data = v_res.json()
                      
                      if 'videos' in v_data and len(v_data['videos']) > 0:
                          v_link = random.choice(v_data['videos'])['video_files'][0]['link']
                      else:
                          v_link = "https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-background-43553-large.mp4"
                      
                      v_path = f"raw_{i}.mp4"
                      with open(v_path, "wb") as f: f.write(requests.get(v_link).content)

                      # 3. المونتاج
                      bg_clip = VideoFileClip(v_path).resize(height=1920).crop(x_center=540, width=1080).set_duration(voice.duration + 1)
                      
                      # طبقة النص
                      overlay = ColorClip(size=(1080, 500), color=(0,0,0)).set_opacity(0.6).set_position(('center', 1300)).set_duration(bg_clip.duration)
                      
                      wrapped_text = "\n".join(textwrap.wrap(title.upper(), width=20))
                      # محاولة إنشاء النص مع معالجة الخطأ
                      try:
                          txt = TextClip(wrapped_text, fontsize=70, color='white', font='Arial-Bold', method='caption', size=(900, None)).set_position(('center', 1350)).set_duration(bg_clip.duration)
                          final = CompositeVideoClip([bg_clip, overlay, txt], size=(1080, 1920))
                      except Exception as e:
                          print(f"⚠️ TextClip failed, creating video without text: {e}")
                          final = CompositeVideoClip([bg_clip, overlay], size=(1080, 1920))
                      
                      final = final.set_audio(voice)
                      
                      output_file = os.path.join(output_dir, f"short_{i+1}.mp4")
                      final.write_videofile(output_file, fps=24, codec="libx264", audio_codec="aac", preset="ultrafast")
                      
                      print(f"✅ Saved: {output_file}")
                      final.close()
                      bg_clip.close()
                      voice.close()
                      
                  except Exception as e:
                      print(f"❌ Critical error in item {i}: {e}")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python3 news_to_video.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Viral-Shorts-Output
          path: output/
