name: 4-Shorts Pro Factory Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install requests beautifulsoup4 edge-tts pillow numpy moviepy==1.0.3

      - name: Run Generator
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat << 'EOF' > news_to_video.py
          import os, requests, random, textwrap, asyncio
          from bs4 import BeautifulSoup
          import edge_tts
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, ColorClip, AudioFileClip, vfx
          from moviepy.config import change_settings

          change_settings({"IMAGEMAGICK_BINARY": "/usr/bin/convert"})

          async def main():
              api_key = os.getenv('PEXELS_API_KEY')
              os.makedirs("output", exist_ok=True)
              
              print("🌐 Fetching News...")
              res = requests.get("https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en")
              items = BeautifulSoup(res.content, 'xml').find_all('item')[:4]
              
              for i, item in enumerate(items):
                  try:
                      title = item.title.text.split(' - ')[0].replace('"', '')
                      print(f"🎬 Creating Short {i+1}: {title}")
                      
                      # Voice
                      audio_path = f"output/audio_{i}.mp3"
                      communicate = edge_tts.Communicate(f"Breaking. {title}", "en-US-ChristopherNeural")
                      await communicate.save(audio_path)
                      voice = AudioFileClip(audio_path)

                      # Video
                      headers = {'Authorization': api_key}
                      v_res = requests.get(f"https://api.pexels.com/videos/search?query={title.split()[0]}&per_page=1", headers=headers)
                      v_data = v_res.json()
                      v_link = v_data['videos'][0]['video_files'][0]['link'] if v_data.get('videos') else "https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-background-43553-large.mp4"
                      
                      v_path = f"raw_{i}.mp4"
                      with open(v_path, "wb") as f: f.write(requests.get(v_link).content)

                      # Assemble
                      clip = VideoFileClip(v_path).resize(height=1920).crop(x_center=540, width=1080).set_duration(voice.duration + 1)
                      
                      txt = TextClip(title.upper(), fontsize=70, color='white', font='Arial-Bold', method='caption', size=(900, None)).set_position('center').set_duration(clip.duration)
                      
                      final = CompositeVideoClip([clip, txt]).set_audio(voice)
                      final.write_videofile(f"output/short_{i+1}.mp4", fps=24, codec="libx264", audio_codec="aac", preset="ultrafast")
                      
                      # Cleanup
                      final.close()
                      clip.close()
                      voice.close()
                  except Exception as e:
                      print(f"❌ Error in {i}: {e}")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python3 news_to_video.py

      - name: Upload Results
        if: always() # لضمان الرفع حتى لو فشل السكربت جزئياً
        uses: actions/upload-artifact@v4
        with:
          name: Shorts-Factory-Output
          path: output/
