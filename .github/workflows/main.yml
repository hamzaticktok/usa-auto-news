import os
import random
from datetime import datetime
from moviepy.editor import (
    VideoFileClip,
    AudioFileClip,
    concatenate_videoclips,
    afx
)

# ===============================
# SETTINGS
# ===============================
output_folder = "output"
music_folder = "music"
today = datetime.now().strftime("%Y-%m-%d")

# ===============================
# ENSURE OUTPUT FOLDER
# ===============================
os.makedirs(output_folder, exist_ok=True)

# ===============================
# LOAD VIDEO FILES
# ===============================
video_files = [
    os.path.join(output_folder, f)
    for f in os.listdir(output_folder)
    if f.endswith(".mp4") and "final" not in f
]

if not video_files:
    print("❌ No input video files found in output folder.")
    exit(1)

print(f"✅ Found {len(video_files)} input videos.")

clips = []
for file in video_files:
    try:
        clip = VideoFileClip(file)
        clips.append(clip)
        print(f"Loaded: {file}")
    except Exception as e:
        print(f"⚠️ Error loading {file}: {e}")

if not clips:
    print("❌ No valid clips loaded.")
    exit(1)

# ===============================
# CREATE LONG VIDEO
# ===============================
final_long = concatenate_videoclips(clips, method="compose")

# ===============================
# OPTIONAL BACKGROUND MUSIC
# ===============================
if os.path.exists(music_folder):
    music_files = [
        os.path.join(music_folder, f)
        for f in os.listdir(music_folder)
        if f.endswith(".mp3")
    ]
else:
    music_files = []

if music_files:
    selected_music = random.choice(music_files)
    print(f"🎵 Selected music: {selected_music}")

    try:
        audio = AudioFileClip(selected_music)

        # Loop music if shorter than video
        if audio.duration < final_long.duration:
            audio = afx.audio_loop(audio, duration=final_long.duration)
        else:
            audio = audio.subclip(0, final_long.duration)

        final_long = final_long.set_audio(audio)
        print("✅ Music added successfully.")
    except Exception as e:
        print(f"⚠️ Failed to add music: {e}")
else:
    print("ℹ️ No music found. Continuing without background music.")

# ===============================
# EXPORT LONG VIDEO
# ===============================
long_output_path = os.path.join(
    output_folder,
    f"usa_trends_long_{today}.mp4"
)

print("🎬 Rendering LONG video...")
final_long.write_videofile(
    long_output_path,
    codec="libx264",
    audio_codec="aac",
    fps=24
)

# ===============================
# CREATE SHORTS VERSION (<= 60s)
# ===============================
short_duration = min(60, final_long.duration)
final_short = final_long.subclip(0, short_duration)

short_output_path = os.path.join(
    output_folder,
    f"usa_trends_shorts_{today}.mp4"
)

print("📱 Rendering SHORTS video...")
final_short.write_videofile(
    short_output_path,
    codec="libx264",
    audio_codec="aac",
    fps=24
)

print("🎉 All videos generated successfully!")
