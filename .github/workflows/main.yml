name: Global AI News Network

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run System
        run: python main.py

      - name: Upload Generated Videos
        uses: actions/upload-artifact@v3
        with:
          name: generated-videos
          path: |
            *.mp4

      - name: Commit JSON Updates
        run: |
          git config --global user.name "news-bot"
          git config --global user.email "bot@example.com"
          git add performance_data.json used.txt logs.txt || true
          git commit -m "Auto update data files" || echo "No changes"
          git push || echo "No push"
