import os, requests
          from bs4 import BeautifulSoup
          from gtts import gTTS
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, AudioFileClip, ColorClip, concatenate_videoclips
          import moviepy.video.fx.all as vfx
          import PIL.Image

          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          def get_all_trends(limit=3):
              url = "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"
              r = requests.get(url, timeout=10)
              soup = BeautifulSoup(r.content, 'xml')
              return [item.title.text.split("-")[0].strip() for item in soup.find_all('item')[:limit]]

          def get_video(query):
              api_key = os.getenv('PEXELS_API_KEY')
              url = f"https://api.pexels.com/videos/search?query={query}&per_page=1&orientation=portrait&size=large"
              r = requests.get(url, headers={'Authorization': api_key})
              data = r.json()
              if data.get('videos'):
                  return max(data['videos'][0]['video_files'], key=lambda x: x['width'])['link']
              return "https://assets.mixkit.co/videos/preview/mixkit-breaking-news-digital-animation-with-hud-elements-33303-large.mp4"

          def create_pro_clip(title, filename):
              os.makedirs("temp", exist_ok=True)
              # 1. الصوت
              tts = gTTS(text=f"Breaking news. {title}", lang='en')
              audio_path = f"temp/a_{filename}.mp3"
              tts.save(audio_path)
              audio = AudioFileClip(audio_path)

              # 2. فيديو مع تأثير الزوم (Zoom In)
              v_url = get_video(" ".join(title.split()[:2]))
              v_path = f"temp/v_{filename}.mp4"
              with open(v_path, "wb") as f: f.write(requests.get(v_url).content)
              
              clip = VideoFileClip(v_path).resize(height=1920).crop(x_center=540, width=1080).set_duration(audio.duration + 1)
              # إضافة تأثير تقريب بسيط
              clip = clip.fx(vfx.resize, lambda t: 1 + 0.04 * t) 

              # 3. الهوية البصرية (نص الخبر الاحترافي)
              # شريط العنوان الأحمر
              bar = ColorClip(size=(1080, 450), color=(200, 0, 0)).set_opacity(0.9).set_position(('center', 1300)).set_duration(clip.duration)
              
              # النص الرئيسي مع ظل (Shadow)
              txt = TextClip(title.upper(), fontsize=75, color='white', font='DejaVu-Sans-Bold', method='caption', size=(900, None)).set_position(('center', 1330)).set_duration(clip.duration)
              
              # شعار "BREAKING NEWS" في الأعلى بتصميم عصري
              header_bg = ColorClip(size=(600, 120), color=(255, 255, 0)).set_position(('center', 150)).set_duration(clip.duration)
              header_txt = TextClip("BREAKING", fontsize=80, color='black', font='DejaVu-Sans-Bold').set_position(('center', 160)).set_duration(clip.duration)

              # 4. شريط الأخبار المتحرك في الأسفل (Ticker)
              ticker_text = f" • {title.upper()} " * 3
              ticker = TextClip(ticker_text, fontsize=40, color='white', font='DejaVu-Sans').set_position(lambda t: (1080 - (200*t), 1760)).set_duration(clip.duration)
              ticker_bg = ColorClip(size=(1080, 60), color=(0, 0, 0)).set_position((0, 1750)).set_duration(clip.duration)

              return CompositeVideoClip([clip, bar, txt, header_bg, header_txt, ticker_bg, ticker]).set_audio(audio)

          os.makedirs("output", exist_ok=True)
          news_list = get_all_trends(3)

          # إنتاج الفيديوهات
          for i, news in enumerate(news_list):
              final = create_pro_clip(news, f"n_{i}")
              final.write_videofile(f"output/pro_short_{i+1}.mp4", fps=24, codec="libx264", audio_codec="aac")
