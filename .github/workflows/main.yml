name: Ultimate News Factory PRO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install requests beautifulsoup4 lxml gtts moviepy==1.0.3 pillow

      - name: Generate Professional Content
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat <<EOT > your_script.py
          import os, requests
          from bs4 import BeautifulSoup
          from gtts import gTTS
          import PIL.Image
          if not hasattr(PIL.Image, 'ANTIALIAS'): PIL.Image.ANTIALIAS = PIL.Image.LANCZOS
          
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, AudioFileClip, ColorClip, concatenate_videoclips
          import moviepy.video.fx.all as vfx

          def get_video(query):
              api_key = os.getenv('PEXELS_API_KEY')
              headers = {'Authorization': api_key}
              url = f"https://api.pexels.com/videos/search?query={query}&per_page=1&orientation=portrait"
              try:
                  r = requests.get(url, headers=headers, timeout=15)
                  return r.json()['videos'][0]['video_files'][0]['link']
              except:
                  return "https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-news-report-background-33303-large.mp4"

          def create_clip(title, index):
              os.makedirs("temp", exist_ok=True)
              # 1. الصوت (المذيع)
              tts = gTTS(text=f"Breaking news. {title}", lang='en')
              tts.save(f"temp/voice_{index}.mp3")
              voice = AudioFileClip(f"temp/voice_{index}.mp3")

              # 2. الفيديو مع زوم
              v_url = get_video(" ".join(title.split()[:2]))
              with open(f"temp/v_{index}.mp4", "wb") as f: f.write(requests.get(v_url).content)
              
              clip = VideoFileClip(f"temp/v_{index}.mp4").resize(height=1920).crop(x_center=540, width=1080).set_duration(voice.duration + 1.5)
              clip = clip.fx(vfx.resize, lambda t: 1 + 0.03 * t)

              # 3. الجرافيك
              bg_bar = ColorClip(size=(1080, 450), color=(180, 0, 0)).set_opacity(0.85).set_position(('center', 1250)).set_duration(clip.duration)
              
              # نص الخبر مع تصميم احترافي
              txt = TextClip(title.upper(), fontsize=70, color='white', font='DejaVu-Sans-Bold', 
                             method='caption', size=(950, None), stroke_color='black', stroke_width=2).set_position(('center', 1280)).set_duration(clip.duration)
              
              header = TextClip("LIVE NEWS", fontsize=100, color='yellow', font='DejaVu-Sans-Bold',
                                stroke_color='black', stroke_width=2).set_position(('center', 200)).set_duration(clip.duration)

              return CompositeVideoClip([clip, bg_bar, txt, header]).set_audio(voice)

          os.makedirs("output", exist_ok=True)
          # جلب 4 أخبار
          r = requests.get("https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en")
          soup = BeautifulSoup(r.content, 'xml')
          trends = [item.title.text.split("-")[0].strip() for item in soup.find_all('item')[:4]]

          clips = []
          for i, news in enumerate(trends):
              print(f"Processing Clip {i+1}...")
              c = create_clip(news, i)
              clips.append(c)
              # حفظ الـ Shorts الفردية (أول خبرين)
              if i < 2:
                  c.write_videofile(f"output/short_{i+1}.mp4", fps=24, codec="libx264")

          # إنشاء الفيديو الطويل (تجميع كل المقاطع)
          print("Creating Long Video...")
          # إضافة موسيقى خلفية للفيديو الطويل فقط
          long_video = concatenate_videoclips(clips, method="compose")
          
          # محاولة إضافة موسيقى خلفية (اختياري)
          try:
              music_url = "https://www.bensound.com/bensound-music/bensound-evolution.mp3"
              with open("temp/music.mp3", "wb") as f: f.write(requests.get(music_url).content)
              bg_music = AudioFileClip("temp/music.mp3").volumex(0.1).set_duration(long_video.duration)
              final_audio = CompositeAudioClip([long_video.audio, bg_music])
              long_video = long_video.set_audio(final_audio)
          except:
              pass

          long_video.write_videofile("output/long_news_video.mp4", fps=24, codec="libx264")
          EOT
          python3 your_script.py

      - name: Upload All Professional Content
        uses: actions/upload-artifact@v4
        with:
          name: news-professional-package
          path: output/*.mp4
