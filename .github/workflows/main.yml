name: 4-Shorts Hybrid Pro (Video & Images)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          pip install requests beautifulsoup4 lxml edge-tts

      - name: Generate Hybrid HD Shorts
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat << 'EOF' > news_to_video.py
          import os, requests, random, asyncio, textwrap, re
          from bs4 import BeautifulSoup
          import edge_tts

          def get_smart_keywords(title):
              stop_words = {'a', 'an', 'the', 'breaking', 'news', 'update', 'says', 'after', 'with', 'for', 'over', 'is', 'at', 'on', 'in'}
              words = re.findall(r'\w+', title.lower())
              keywords = [w for w in words if w not in stop_words and len(w) > 2]
              return " ".join(keywords[:2]) if keywords else "news"

          async def main():
              api_key = os.getenv('PEXELS_API_KEY')
              os.makedirs("output", exist_ok=True)
              headers = {'Authorization': api_key}
              
              res = requests.get("https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en")
              items = BeautifulSoup(res.content, 'lxml-xml').find_all('item')[:4]
              
              for i, item in enumerate(items):
                  try:
                      title = item.title.text.split(' - ')[0].replace('"', '').replace("'", "")
                      keywords = get_smart_keywords(title)
                      print(f"🎬 Processing {i+1}: {keywords}")
                      
                      # 1. الصوت
                      audio_path = f"audio_{i}.mp3"
                      await edge_tts.Communicate(f"Breaking. {title}", "en-US-ChristopherNeural").save(audio_path)

                      # 2. جلب الوسائط (فيديو أو صورة)
                      is_image = False
                      v_res = requests.get(f"https://api.pexels.com/videos/search?query={keywords}&per_page=5&orientation=portrait", headers=headers).json()
                      
                      if v_res.get('videos'):
                          media_url = random.choice(v_res['videos'])['video_files'][0]['link']
                      else:
                          print("⚠️ No video found, searching for images...")
                          img_res = requests.get(f"https://api.pexels.com/v1/search?query={keywords}&per_page=5&orientation=portrait", headers=headers).json()
                          media_url = random.choice(img_res['photos'])['src']['large2x'] if img_res.get('photos') else "https://images.pexels.com/photos/395196/pexels-photo-395196.jpeg"
                          is_image = True
                      
                      media_path = f"media_{i}.{'jpg' if is_image else 'mp4'}"
                      with open(media_path, "wb") as f: f.write(requests.get(media_url).content)

                      # 3. المونتاج بفلتر متطور (Zoom Effect للصور)
                      output_file = f"output/short_{i+1}.mp4"
                      
                      if is_image:
                          # تأثير الزوم السينمائي للصورة لجعلها نابضة بالحياة
                          vf = (f"zoompan=z='min(zoom+0.0015,1.5)':d=360:s=1080x1920,scale=1080:1920,"
                                f"drawbox=y=ih-500:color=black@0.7:width=iw:height=400:t=fill,"
                                f"drawtext=text='{title[:65]}...':fontcolor=white:fontsize=55:x=(w-text_w)/2:y=h-400:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf")
                          input_flag = f"-loop 1 -i {media_path}"
                      else:
                          # فلتر الفيديو العادي
                          vf = (f"scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,"
                                f"drawbox=y=ih-500:color=black@0.7:width=iw:height=400:t=fill,"
                                f"drawtext=text='{title[:65]}...':fontcolor=white:fontsize=55:x=(w-text_w)/2:y=h-400:fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf")
                          input_flag = f"-i {media_path}"

                      os.system(f'ffmpeg {input_flag} -i {audio_path} -t 15 -vf "{vf}" -c:v libx264 -crf 18 -preset slow -pix_fmt yuv420p -c:a aac -b:a 192k -shortest {output_file} -y')
                      
                  except Exception as e: print(f"❌ Error: {e}")

          if __name__ == "__main__": asyncio.run(main())
          EOF
          python3 news_to_video.py

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hybrid-HD-Shorts
          path: output/*.mp4
