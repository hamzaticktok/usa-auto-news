name: Global AI News Network

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install ffmpeg -y

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install moviepy imageio imageio-ffmpeg numpy

      - name: Create Output Folder
        run: mkdir -p output

        - name: Run System
        run: python main.py

      # 🔎 البحث عن أي فيديو في المشروع
      - name: Locate Video File
        run: |
          echo "Searching for video files..."
          find . -type f \( -iname "*.mp4" -o -iname "*.mov" -o -iname "*.avi" \) > video_list.txt
          cat video_list.txt

          if [ ! -s video_list.txt ]; then
            echo "❌ No video file found!"
            exit 1
          fi

      # 📦 نقل الفيديو إلى مجلد artifact
      - name: Prepare Artifact
        run: |
          mkdir -p artifact
          while read file; do
            cp "$file" artifact/
          done < video_list.txt
          ls -la artifact

      # ⬆️ رفع الفيديو
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: artifact/

      - name: Commit Changes
        run: |
          git config --global user.name "news-bot"
          git config --global user.email "bot@example.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto generated update"
            git push
          fi
