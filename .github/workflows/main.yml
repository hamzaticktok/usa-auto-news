name: Auto Video News Generator

on:
  workflow_dispatch: # تشغيل يدوي
  schedule:
    - cron: '0 */6 * * *' # تشغيل تلقائي كل 6 ساعات

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          # فك قفل الحماية عن ImageMagick للسماح بإنشاء النصوص
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install requests beautifulsoup4 lxml gtts moviepy==1.0.3 pillow

      - name: Generate Pro Video
        run: |
          cat <<EOT > your_script.py
          import os, requests
          from bs4 import BeautifulSoup
          from gtts import gTTS
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, AudioFileClip, ColorClip
          import PIL.Image

          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          def get_usa_trends():
              try:
                  url = "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"
                  r = requests.get(url, timeout=10)
                  soup = BeautifulSoup(r.content, 'xml')
                  return soup.find('item').title.text.split("-")[0].strip()
              except:
                  return "Breaking News: USA Update"

          trend_title = get_usa_trends()
          os.makedirs("output", exist_ok=True)
          os.makedirs("temp", exist_ok=True)

          # 1. الصوت
          tts = gTTS(text=f"Breaking news. {trend_title}", lang='en')
          tts.save("temp/voice.mp3")
          audio = AudioFileClip("temp/voice.mp3")

          # 2. الفيديو الخلفية
          video_url = "https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-news-report-background-33303-large.mp4"
          try:
              r = requests.get(video_url, timeout=15)
              with open("temp/bg.mp4", "wb") as f: f.write(r.content)
              bg_clip = VideoFileClip("temp/bg.mp4").resize(height=1920)
              bg_clip = bg_clip.crop(x_center=bg_clip.w/2, width=1080).set_duration(audio.duration + 2)
          except Exception as e:
              print(f"Error downloading video: {e}")
              bg_clip = ColorClip(size=(1080, 1920), color=(20,20,20)).set_duration(audio.duration + 2)

          # 3. النصوص
          bar = ColorClip(size=(1080, 400), color=(200, 0, 0)).set_opacity(0.8).set_position(('center', 1300)).set_duration(bg_clip.duration)
          txt = TextClip(trend_title.upper(), fontsize=65, color='white', font='DejaVu-Sans-Bold', method='caption', size=(900, None)).set_position(('center', 1350)).set_duration(bg_clip.duration)
          header = TextClip("USA TRENDS", fontsize=90, color='yellow', font='DejaVu-Sans-Bold').set_position(('center', 200)).set_duration(bg_clip.duration)

          final = CompositeVideoClip([bg_clip, bar, txt, header]).set_audio(audio)
          final.write_videofile("output/final_trend.mp4", codec="libx264", audio_codec="aac", fps=24, threads=4)
          EOT
          python3 your_script.py

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-video
          path: output/final_trend.mp4
