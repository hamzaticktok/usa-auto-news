name: Build Videos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install moviepy imageio[ffmpeg]

    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    # مجلدات الفيديو والموسيقى موجودة مسبقًا
    - name: Ensure folders
      run: |
        mkdir -p output
        mkdir -p videos
        mkdir -p music

    - name: Run video script
      run: python3 your_script.py

    - name: Upload output videos
      uses: actions/upload-artifact@v4
      with:
        name: videos
        path: output/
