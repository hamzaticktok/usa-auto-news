import feedparser
import random
import json
import os
from datetime import datetime
from gtts import gTTS
from moviepy.editor import *
import numpy as np

RSS = "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"

def load_config():
    with open("config.json","r") as f:
        return json.load(f)

def log_error(e):
    with open("logs.txt","a") as f:
        f.write(str(e) + "\n")

def create_dynamic_background(duration):

    def make_frame(t):
        color_shift = int((t * 20) % 255)
        frame = np.zeros((1920,1080,3), dtype=np.uint8)
        frame[:,:,0] = (10 + color_shift) % 255
        frame[:,:,1] = (30 + color_shift*2) % 255
        frame[:,:,2] = (60 + color_shift*3) % 255
        return frame

    return VideoClip(make_frame, duration=duration)

try:

    config = load_config()
    feed = feedparser.parse(RSS)

    if not os.path.exists("used.txt"):
        open("used.txt","w").close()

    with open("used.txt","r") as f:
        used_titles = f.read()

    count = 0

    for entry in feed.entries:

        if count >= config["videos_per_day"]:
            break

        if entry.title in used_titles:
            continue

        news_title = entry.title

        with open("used.txt","a") as f:
            f.write(news_title + "\n")

        script = f"""
        Breaking News Update.

        {news_title}.

        Stay tuned for more updates from the United States.
        """

        tts = gTTS(script, lang="en")
        voice_file = f"voice_{count}.mp3"
        tts.save(voice_file)

        audio = AudioFileClip(voice_file)
        duration = audio.duration

        background = create_dynamic_background(duration)
        background = background.set_audio(audio)

        output_file = f"final_{count}.mp4"

        background.write_videofile(
            output_file,
            fps=24,
            codec="libx264",
            audio_codec="aac"
        )

        count += 1

except Exception as e:
    log_error(e)
