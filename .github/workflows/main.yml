name: USA Trends Professional Creator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # يعمل تلقائياً كل 6 ساعات لجلب أحدث ترند

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Professional Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml
          pip install moviepy==1.0.3 requests beautifulsoup4

      - name: USA Trends Script
        run: |
          cat <<EOT > your_script.py
          import os, requests
          from bs4 import BeautifulSoup
          from moviepy.editor import ColorClip, TextClip, CompositeVideoClip

          # 1. جلب الترند الأمريكي (عناوين الأخبار الحالية)
          def get_usa_trends():
              print("🔍 Fetching USA Trends...")
              url = "https://news.google.com/rss/search?q=USA+Trending+News&hl=en-US&gl=US&ceid=US:en"
              response = requests.get(url)
              soup = BeautifulSoup(response.content, 'xml')
              titles = [item.title.text for item in soup.find_all('item')[:3]]
              return titles if titles else ["USA Breaking News", "Trending in America"]

          trends = get_usa_trends()
          main_trend = trends[0].split("-")[0] # تنظيف العنوان

          os.makedirs("output", exist_ok=True)

          # 2. تصميم الفيديو الاحترافي (Format 9:16)
          print(f"🎬 Creating video for: {main_trend}")
          
          # خلفية داكنة مع شريط أحمر للـ Breaking News
          bg = ColorClip(size=(1080, 1920), color=(15, 15, 15), duration=10)
          red_bar = ColorClip(size=(1080, 250), color=(200, 0, 0), duration=10).set_position(('center', 200))
          
          try:
              # نص BREAKING NEWS
              header = TextClip("BREAKING NEWS", fontsize=100, color='white', font='Arial-Bold').set_position(('center', 250)).set_duration(10)
              
              # نص الترند (المحتوى الحقيقي المستخرج)
              trend_text = TextClip(main_trend, fontsize=70, color='white', font='Arial', method='caption', size=(900, None))
              trend_text = trend_text.set_position('center').set_duration(10)
              
              # اسم القناة في الأسفل
              footer = TextClip("@TRENDSUSA25", fontsize=50, color='gray', font='Arial').set_position(('center', 1700)).set_duration(10)
              
              final = CompositeVideoClip([bg, red_bar, header, trend_text, footer])
          except Exception as e:
              print(f"Drawing Error: {e}")
              final = bg

          final.write_videofile("output/usa_trend_final.mp4", codec="libx264", fps=24, audio=False)
          print("✅ Professional Trend Video Ready!")
          EOT
          
          python3 your_script.py

      - name: Save Trend Video
        uses: actions/upload-artifact@v4
        with:
          name: USA-Daily-Trend
          path: "output/*.mp4"
