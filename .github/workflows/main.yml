name: USA Trends Pro Creator (Voice + Video)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Advanced Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml
          pip install moviepy==1.0.3 requests beautifulsoup4 gTTS lxml

      - name: Generate Pro Video
        run: |
          cat <<EOT > your_script.py
          import os, requests
          from bs4 import BeautifulSoup
          from gtts import gTTS
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, AudioFileClip, ColorClip

          # 1. جلب الترند الأمريكي الحقيقي
          def get_usa_trends():
              url = "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"
              response = requests.get(url)
              soup = BeautifulSoup(response.content, 'xml')
              item = soup.find('item')
              return item.title.text.split("-")[0].strip()

          trend_title = get_usa_trends()
          print(f"🔥 Today's Trend: {trend_title}")

          os.makedirs("output", exist_ok=True)
          os.makedirs("temp", exist_ok=True)

          # 2. إنشاء التعليق الصوتي (Voiceover)
          voice_text = f"Breaking news in the United States. {trend_title}. Stay tuned for more updates on Trends USA 25."
          tts = gTTS(text=voice_text, lang='en', slow=False)
          tts.save("temp/voice.mp3")
          audio = AudioFileClip("temp/voice.mp3")

          # 3. جلب فيديو خلفية (استخدام فيديو افتراضي عالي الجودة)
          # سنستخدم فيديو "أفق مدينة" أو "علم أمريكا" من رابط مباشر مستقر
          video_url = "https://v.ftcdn.net/02/10/34/03/700_F_210340338_S9y9vP2S0qO2fD0P3F4x5J7z9Q7zL6Z6_ST.mp4"
          try:
              r = requests.get(video_url, stream=True)
              with open("temp/bg_video.mp4", "wb") as f:
                  for chunk in r.iter_content(8192): f.write(chunk)
              bg_clip = VideoFileClip("temp/bg_video.mp4").resize(height=1920).crop(x_center=540, width=1080)
          except:
              bg_clip = ColorClip(size=(1080, 1920), color=(20, 20, 20))

          bg_clip = bg_clip.set_duration(audio.duration + 2)

          # 4. إضافة النصوص الاحترافية
          try:
              # شريط الخبر السفلي
              bar = ColorClip(size=(1080, 350), color=(200, 0, 0)).set_opacity(0.8).set_position(('center', 1400)).set_duration(bg_clip.duration)
              
              news_txt = TextClip(trend_title, fontsize=70, color='white', font='Arial-Bold', method='caption', size=(900, None))
              news_txt = news_txt.set_position(('center', 1450)).set_duration(bg_clip.duration)
              
              header = TextClip("BREAKING NEWS", fontsize=100, color='yellow', font='Arial-Bold').set_position(('center', 200)).set_duration(bg_clip.duration)

              final_video = CompositeVideoClip([bg_clip, bar, news_txt, header])
          except:
              final_video = bg_clip

          # 5. دمج الصوت مع الفيديو
          final_video = final_video.set_audio(audio)
          
          print("💾 Exporting Final Professional Video...")
          final_video.write_videofile("output/final_trend.mp4", codec="libx264", audio_codec="aac", fps=24)
          print("✅ Done!")
          EOT
          
          python3 your_script.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: USA-Pro-Shorts
          path: "output/final_trend.mp4"
