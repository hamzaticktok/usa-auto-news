name: TrendsUSA Full Automation

on:
  workflow_dispatch: # للتشغيل اليدوي
  schedule:
    - cron: '0 15 * * *' # تشغيل تلقائي يومياً الساعة 3 مساءً

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install moviepy==1.0.3 imageio==2.25.1 google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Create Video Script
        run: |
          cat <<EOT > your_script.py
          import os, urllib.request
          from moviepy.editor import VideoFileClip, AudioFileClip

          os.makedirs("output", exist_ok=True)
          os.makedirs("temp", exist_ok=True)

          # روابط المصادر (يمكنك تغييرها لاحقاً بروابط أخبار حقيقية)
          v_url = "https://www.sample-videos.com/video312/mp4/720/big_buck_bunny_720p_1mb.mp4"
          m_url = "https://www.computerhope.com/jargon/m/example.mp3"

          print("Downloading Assets...")
          urllib.request.urlretrieve(v_url, "temp/v.mp4")
          urllib.request.urlretrieve(m_url, "temp/m.mp3")

          print("Creating Content...")
          clip = VideoFileClip("temp/v.mp4").resize(height=1280) # Shorts Format
          audio = AudioFileClip("temp/m.mp3").set_duration(clip.duration)
          final = clip.set_audio(audio)
          
          final.write_videofile("output/final_video.mp4", codec="libx264", audio_codec="aac", fps=24)
          print("✅ Video Generated Successfully!")
          EOT
          python3 your_script.py

      - name: Upload to YouTube
        env:
          CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          # هذا الجزء سيعمل فقط إذا أضفت المفاتيح في إعدادات GitHub
          if [ -z "$REFRESH_TOKEN" ]; then
            echo "⚠️ الرفع متوقف! يجب إضافة Secrets في إعدادات GitHub أولاً."
          else
            echo "🚀 جاري الرفع إلى TRENDSUSA25..."
            # هنا يوضع سكربت الرفع الذي يستخدم المكتبات المثبتة
          fi

      - name: Save Copy
        uses: actions/upload-artifact@v4
        with:
          name: trends-video-copy
          path: output/
