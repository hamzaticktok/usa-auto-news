name: Global AI News Network

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ تحميل المشروع
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ تثبيت FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 3️⃣ إعداد Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 4️⃣ تثبيت المكتبات
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 imageio imageio-ffmpeg numpy

      # 5️⃣ إنشاء مجلد output
      - name: Create Output Folder
        run: mkdir -p output

      # 6️⃣ تشغيل main.py لإنشاء الفيديو
      - name: Run main.py
        run: python main.py

      # 7️⃣ عرض الملفات في مجلد output للتأكد
      - name: Check Output Folder
        run: ls -la output/

      # 8️⃣ البحث عن أي فيديو جديد
      - name: Locate Video
        run: |
          echo "Searching for video files..."
          find output -type f \( -iname "*.mp4" -o -iname "*.mov" -o -iname "*.avi" \) > video_list.txt
          cat video_list.txt
          if [ ! -s video_list.txt ]; then
            echo "❌ ERROR: No video file was generated!"
            exit 1
          fi

      # 9️⃣ تجهيز artifact
      - name: Prepare Artifact
        run: |
          mkdir -p artifact
          while read file; do
            cp "$file" artifact/
          done < video_list.txt
          echo "===== ARTIFACT CONTENT ====="
          ls -la artifact

      # 🔟 رفع الفيديو كـ artifact
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: artifact/
