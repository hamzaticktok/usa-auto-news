name: Build Videos

on:
  push:
    branches:
      - main
  workflow_dispatch:  # لتشغيله يدويًا من GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ سحب المستودع
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ إعداد Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # 3️⃣ تثبيت مكتبات Python
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install moviepy imageio[ffmpeg]

    # 4️⃣ تثبيت FFmpeg
    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    # 5️⃣ تحضير المجلدات
    - name: Prepare folders
      run: |
        mkdir -p output
        mkdir -p music

    # 6️⃣ تنزيل ملفات الفيديو (ضع روابطك هنا)
    - name: Download sample videos
      run: |
        wget -O output/video1.mp4 "https://example.com/video1.mp4"
        wget -O output/video2.mp4 "https://example.com/video2.mp4"

    # 7️⃣ تنزيل الموسيقى الخلفية (ضع رابطك هنا)
    - name: Download background music
      run: |
        wget -O music/music.mp3 "https://example.com/music.mp3"

    # 8️⃣ تشغيل السكربت المحسّن
    - name: Run video script
      run: |
        python3 your_script.py  # استبدل باسم سكربتك

    # 9️⃣ رفع النتائج كـ Artifacts
    - name: Upload output videos as artifact
      uses: actions/upload-artifact@v3
      with:
        name: videos
        path: output/
