name: High Quality News Generator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          # فك قفل الحماية عن ImageMagick للسماح بإنشاء النصوص
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install requests beautifulsoup4 lxml gtts moviepy==1.0.3 pillow

      - name: Generate All High Quality Videos
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat <<EOT > your_script.py
          import os, requests
          from bs4 import BeautifulSoup
          from gtts import gTTS
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, AudioFileClip, ColorClip, concatenate_videoclips
          import PIL.Image

          if not hasattr(PIL.Image, 'ANTIALIAS'):
              PIL.Image.ANTIALIAS = PIL.Image.LANCZOS

          def get_all_trends(limit=5):
              try:
                  url = "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"
                  r = requests.get(url, timeout=10)
                  soup = BeautifulSoup(r.content, 'xml')
                  items = soup.find_all('item')[:limit]
                  return [item.title.text.split("-")[0].strip() for item in items]
              except:
                  return ["Breaking News Update"] * limit

          def get_best_pexels_video(query):
              api_key = os.getenv('PEXELS_API_KEY')
              headers = {'Authorization': api_key}
              # طلب فيديوهات عمودية حصراً وبجودة عالية
              url = f"https://api.pexels.com/videos/search?query={query}&per_page=1&orientation=portrait&size=large"
              try:
                  r = requests.get(url, headers=headers, timeout=15)
                  data = r.json()
                  if data['videos']:
                      video_files = data['videos'][0]['video_files']
                      # اختيار أعلى دقة متاحة
                      best_video = max(video_files, key=lambda x: x['width'] * x['height'])
                      return best_video['link']
              except:
                  pass
              return "
