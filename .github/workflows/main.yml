name: USA Trends Professional Automation

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Professional Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          # السماح لـ ImageMagick بالكتابة
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml
          pip install moviepy==1.0.3 requests beautifulsoup4 lxml

      - name: Create USA News Video
        run: |
          cat <<EOT > your_script.py
          import os, requests
          from bs4 import BeautifulSoup
          from moviepy.editor import ColorClip, TextClip, CompositeVideoClip

          def get_usa_trends():
              print("🔍 Fetching Real-time USA Trends...")
              # استخدام رابط أخبار جوجل الرسمي لأمريكا
              url = "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"
              try:
                  response = requests.get(url, timeout=15)
                  soup = BeautifulSoup(response.content, 'html.parser')
                  titles = [item.find('title').text for item in soup.find_all('item')[:5]]
                  return titles
              except:
                  return ["Breaking: USA Market Update", "Trending in Washington DC"]

          trends = get_usa_trends()
          # اختيار العنوان الأول وتصفيته
          main_news = trends[0].split("-")[0].strip()

          os.makedirs("output", exist_ok=True)

          print(f"🎬 Creating Professional Video for: {main_news}")
          
          # 1. تصميم الخلفية (1080x1920) لليوتيوب شورتس
          bg = ColorClip(size=(1080, 1920), color=(10, 10, 10), duration=8)
          
          # 2. شريط الأخبار الأحمر العلوي
          header_bar = ColorClip(size=(1080, 300), color=(200, 0, 0), duration=8).set_position(('center', 200))

          try:
              # نص BREAKING NEWS
              breaking_text = TextClip("BREAKING NEWS", fontsize=110, color='white', font='Arial-Bold').set_position(('center', 280)).set_duration(8)
              
              # نص الخبر الحقيقي (الترند)
              news_content = TextClip(main_news, fontsize=75, color='white', font='Arial', method='caption', size=(900, None))
              news_content = news_content.set_position('center').set_duration(8)
              
              # اسم القناة
              footer = TextClip("@TRENDSUSA25", fontsize=55, color='yellow', font='Arial').set_position(('center', 1600)).set_duration(8)
              
              final = CompositeVideoClip([bg, header_bar, breaking_text, news_content, footer])
          except Exception as e:
              print(f"Drawing Error: {e}. Creating visual fallback.")
              final = bg

          print("💾 Rendering Video...")
          final.write_videofile("output/usa_trend_final.mp4", codec="libx264", fps=24, audio=False)
          print("✅ SUCCESS! Video generated with real-time trend.")
          EOT
          
          python3 your_script.py

      - name: Upload Final Video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: USA-Daily-Trends
          path: "output/*.mp4"
