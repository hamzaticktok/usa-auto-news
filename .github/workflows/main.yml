name: USA Trends Final Pro

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Advanced Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml
          pip install moviepy==1.0.3 requests beautifulsoup4 gTTS lxml

      - name: Generate Pro Video
        run: |
          cat <<EOT > your_script.py
          import os, requests, random
          from bs4 import BeautifulSoup
          from gtts import gTTS
          from moviepy.editor import VideoFileClip, TextClip, CompositeVideoClip, AudioFileClip, ColorClip

          def get_usa_trends():
              url = "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en"
              response = requests.get(url)
              soup = BeautifulSoup(response.content, 'xml')
              item = soup.find('item')
              return item.title.text.split("-")[0].strip()

          trend_title = get_usa_trends()
          os.makedirs("output", exist_ok=True)
          os.makedirs("temp", exist_ok=True)

          # 1. توليد الصوت
          voice_text = f"Breaking news. {trend_title}. Subscribe to Trends USA 25 for more."
          tts = gTTS(text=voice_text, lang='en', slow=False)
          tts.save("temp/voice.mp3")
          audio = AudioFileClip("temp/voice.mp3")

          # 2. جلب فيديو خلفية حقيقي (روابط مباشرة ومضمونة)
          # سنستخدم قائمة روابط احتياطية في حال فشل أحدها
          video_sources = [
              "https://assets.mixkit.co/videos/preview/mixkit-flag-of-the-united-states-of-america-31354-large.mp4",
              "https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-news-report-background-33303-large.mp4"
          ]
          
          video_path = "temp/bg_video.mp4"
          for url in video_sources:
              try:
                  print(f"Trying to download: {url}")
                  r = requests.get(url, timeout=15)
                  with open(video_path, "wb") as f: f.write(r.content)
                  bg_clip = VideoFileClip(video_path)
                  break
              except:
                  continue
          else:
              # إذا فشلت كل الروابط، ننشئ خلفية ملونة كحل أخير
              bg_clip = ColorClip(size=(1080, 1920), color=(20, 20, 20))

          # ضبط مقاسات الفيديو ليكون Shorts (9:16)
          bg_clip = bg_clip.resize(height=1920).crop(x_center=bg_clip.w/2, width=1080).set_duration(audio.duration + 2)

          # 3. النصوص الاحترافية
          try:
              # شريط الخبر (Headline Bar)
              bar = ColorClip(size=(1080, 400), color=(200, 0, 0)).set_opacity(0.8).set_position(('center', 1300)).set_duration(bg_clip.duration)
              
              news_txt = TextClip(trend_title.upper(), fontsize=70, color='white', font='Arial-Bold', method='caption', size=(950, None))
              news_txt = news_txt.set_position(('center', 1350)).set_duration(bg_clip.duration)
              
              logo = TextClip("TRENDS USA 25", fontsize=50, color='yellow', font='Arial-Bold').set_position(('center', 200)).set_duration(bg_clip.duration)

              final_video = CompositeVideoClip([bg_clip, bar, news_txt, logo])
          except:
              final_video = bg_clip

          final_video = final_video.set_audio(audio)
          final_video.write_videofile("output/final_trend.mp4", codec="libx264", audio_codec="aac", fps=24)
          EOT
          
          python3 your_script.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: USA-Daily-Shorts
          path: output/final_trend.mp4
