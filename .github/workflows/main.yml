# main.py
from moviepy.editor import ColorClip
import os
from datetime import datetime

# 1️⃣ إنشاء مجلد output إذا لم يكن موجودًا
os.makedirs("output", exist_ok=True)

# 2️⃣ توليد اسم فيديو ديناميكي بالوقت والتاريخ
timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
video_filename = f"test_{timestamp}.mp4"
output_path = os.path.join("output", video_filename)

# 3️⃣ إعداد الفيديو التجريبي
print(f"Creating test video: {video_filename}")
clip = ColorClip(size=(720, 1280), color=(255, 0, 0))  # فيديو أحمر
clip = clip.set_duration(5)  # مدة 5 ثواني

# 4️⃣ حفظ الفيديو
clip.write_videofile(output_path, fps=24)
print(f"✅ Video created successfully at {output_path}")
