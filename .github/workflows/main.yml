name: 4-Shorts Final Fix No-ImageMagick

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: |
          pip install requests beautifulsoup4 lxml edge-tts pillow numpy moviepy==1.0.3

      - name: Run Generator
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat << 'EOF' > news_to_video.py
          import os, requests, random, textwrap, asyncio
          from bs4 import BeautifulSoup
          import edge_tts
          from PIL import Image, ImageDraw, ImageFont
          import numpy as np
          from moviepy.editor import VideoFileClip, ImageClip, CompositeVideoClip, AudioFileClip, vfx

          def create_text_image(text, filename):
              """رسم النص على صورة شفافة باستخدام Pillow بدلاً من ImageMagick"""
              width, height = 1080, 1920
              img = Image.new('RGBA', (width, height), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              
              # رسم مستطيل خلفية للنص (شبه شفاف)
              draw.rectangle([50, 1300, 1030, 1750], fill=(0, 0, 0, 180))
              
              # محاولة تحميل خط، وإذا لم يوجد نستخدم الخط الافتراضي
              try:
                  font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 60)
              except:
                  font = ImageFont.load_default()
              
              lines = textwrap.wrap(text.upper(), width=22)
              y_text = 1350
              for line in lines:
                  draw.text((width/2, y_text), line, font=font, fill="white", anchor="mm")
                  y_text += 80
              
              img.save(filename)

          async def main():
              api_key = os.getenv('PEXELS_API_KEY')
              os.makedirs("output", exist_ok=True)
              
              print("🌐 Fetching News...")
              res = requests.get("https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en")
              soup = BeautifulSoup(res.content, 'lxml-xml')
              items = soup.find_all('item')[:4]
              
              for i, item in enumerate(items):
                  try:
                      title = item.title.text.split(' - ')[0].replace('"', '')
                      print(f"🎬 Creating Video {i+1}: {title}")
                      
                      # 1. الصوت
                      audio_path = f"output/audio_{i}.mp3"
                      communicate = edge_tts.Communicate(f"Breaking. {title}", "en-US-ChristopherNeural")
                      await communicate.save(audio_path)
                      voice = AudioFileClip(audio_path)

                      # 2. الفيديو الخلفي
                      headers = {'Authorization': api_key}
                      v_res = requests.get(f"https://api.pexels.com/videos/search?query=news&per_page=10", headers=headers)
                      v_data = v_res.json()
                      v_link = random.choice(v_data['videos'])['video_files'][0]['link'] if v_data.get('videos') else "https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-background-43553-large.mp4"
                      
                      v_path = f"raw_{i}.mp4"
                      with open(v_path, "wb") as f: f.write(requests.get(v_link).content)

                      # 3. معالجة النص كصورة (تجاوز ImageMagick)
                      text_img_path = f"text_{i}.png"
